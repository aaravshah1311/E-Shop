.ercustom-popup {
    position: fixed;
    bottom: 1%;
    right: 0.5%;
    width: 300px;
    background-color: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 2px 10px rgba(255, 0, 0, 0.3);
    z-index: 1000;
    display: none;
    text-align: center;
    animation: In 0.5s ease-in-out;
}

@keyframes erfadeIn {
    from {
        opacity: 1;
    }
	to{
		opacity: 0.5;
	}
    to {
        opacity: 0;
    }
}

.ercustom-popup-header {
    background: linear-gradient(90deg, rgba(255,0,0,1) 0%, rgba(255,99,71,1) 100%);
    padding: 10px;
    display: flex;
    align-items: center;
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
}

.ercustom-popup-header img {
    width: 20px;
    height: 20px;
    margin-right: 10px;
    content: url('shop.ico');
}
.custom-popup-body {
    padding: 10px 20px;
    font-size: 16px;
}

.ercustom-popup-footer {
    padding: 5px;
    text-align: right;
}

.ercustom-popup-footer button {
    background-color: red;
    border: none;
    padding: 5px 10px;
    color: white;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.3s ease;
}

.ercustom-popup-footer button:hover {
    background-color: darkred;
    box-shadow: 0 4px 15px rgba(255, 0, 0, 0.5);

    <script>
	var f_total;
	function erpopup(message, popupIconUrl, name = 'E-Shop') {

    var popupBox = document.createElement('div');
    popupBox.className = 'ercustom-popup';

    var popupHeader = document.createElement('div');
    popupHeader.className = 'ercustom-popup-header';

    var leftSection = document.createElement('div');
    leftSection.className = 'left-section';
    var img = document.createElement('img');
    img.src = "shop.ico";
    var span = document.createElement('span');
    span.textContent = "E-Shop";
    leftSection.appendChild(img);
    leftSection.appendChild(span);

    var closeButton = document.createElement('span');
    closeButton.innerHTML = '&times;';
    closeButton.className = 'close-button';
    closeButton.onclick = function() {
        document.body.removeChild(popupBox);
    };

    popupHeader.appendChild(leftSection);
    popupHeader.appendChild(closeButton);

    var popupBody = document.createElement('div');
    popupBody.className = 'custom-popup-body';
    popupBody.textContent = message;

    popupBox.appendChild(popupHeader);
    popupBox.appendChild(popupBody);

    document.body.appendChild(popupBox);

    popupBox.style.display = 'block';

    setTimeout(function() {
        document.body.removeChild(popupBox);
    }, 3000);
}
        function getCurrentDateTime() {
            const now = new Date();

            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const formattedDate = `${day}/${month}/${year}`;
            const formattedTime = `${hours}:${minutes}:${seconds}`;
            const date = formattedDate;
            const time = formattedTime;

            return { date, time };
        }
